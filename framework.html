<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presentation Framework</title>
<!-- THEME FONTS -->
<style>
/* ============================================================
   THEME CSS - Injected by generate-template skill
   ============================================================ */
<!-- THEME CSS -->

/* ============================================================
   ENGINE CSS - Do not modify
   ============================================================ */

/* --- Reset & Base --- */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; -webkit-font-smoothing: antialiased; }
body { font-family: var(--font-primary); background: var(--color-bg-black); color: var(--color-white); overflow: hidden; }

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; -webkit-font-smoothing: antialiased; }
body { font-family: 'Open Sans', Arial, Helvetica, sans-serif; background: #000; color: var(--color-white); overflow: hidden; }
   DECK ENGINE
   ============================================================ */

.deck {
  width: 100vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
  background: var(--color-bg-dark, #282728);
}

.deck-scaler {
  width: 1280px;
  height: 720px;
  position: absolute;
  top: 0; left: 0;
  transform-origin: 0 0;
}

.slide {
  position: absolute;
  top: 0; left: 0;
  width: 1280px;
  height: 720px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: var(--slide-pad-top) var(--slide-pad-x) var(--slide-pad-bottom);
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--tr-slow);
  z-index: var(--z-slide);
  overflow: hidden;
}

.slide.active {
  opacity: 1;
  pointer-events: auto;
}

/* Green top bar on every slide */
.slide::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: var(--color-primary);
  z-index: 2;
}


/* ============================================================
   NAVIGATION CHROME
   ============================================================ */

/* --- Confidential Bar ------------------------------------- */
#conf-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 24px;
  background: var(--color-bg-black);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.6rem;
  font-weight: var(--fw-semi);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--color-text-dim);
  z-index: var(--z-chrome);
}

/* --- Progress Bar ----------------------------------------- */
#progress {
  position: fixed;
  top: 24px; left: 0;
  height: 3px;
  background: var(--color-primary-bright);
  width: 0%;
  transition: width var(--tr-normal);
  z-index: var(--z-chrome);
}

/* --- Dot Navigation --------------------------------------- */
#dots {
  position: fixed;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 10px;
  z-index: var(--z-chrome);
}

.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.25);
  cursor: pointer;
  transition: all var(--tr-fast);
}

.dot:hover { background: rgba(255,255,255,0.5); }
.dot.active { background: var(--color-primary-bright); transform: scale(1.3); }

.dot.has-comment::after {
  content: '';
  position: absolute;
  top: -2px; right: -2px;
  width: 5px; height: 5px;
  background: var(--color-secondary);
  border-radius: 50%;
}

.dot { position: relative; }

/* --- Slide Counter ---------------------------------------- */
#counter {
  position: fixed;
  bottom: 16px; right: 20px;
  font-size: 0.7rem;
  color: var(--color-text-dim);
  z-index: var(--z-chrome);
  font-variant-numeric: tabular-nums;
}

/* --- Nav Buttons ------------------------------------------ */
.nav-btn {
  position: fixed;
  bottom: 16px;
  width: 36px; height: 36px;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 50%;
  background: transparent;
  color: var(--color-text-secondary);
  font-size: 0.9rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--tr-fast);
  z-index: var(--z-chrome);
}

.nav-btn:hover { border-color: var(--color-primary-bright); color: var(--color-primary-bright); }
#prev-btn { right: 110px; }
#next-btn { right: 68px; }

/* --- Logo Mark -------------------------------------------- */
#logo-mark {
  position: absolute;
  top: 10px; left: 24px;
  font-size: 0.85rem;
  font-weight: var(--fw-bold);
  color: var(--color-white);
  letter-spacing: 0.05em;
  z-index: 10;
}

#logo-mark .logo-dot {
  display: inline-block;
  width: 6px; height: 6px;
  background: var(--color-primary);
  border-radius: 50%;
  margin-left: 1px;
  vertical-align: middle;
}

/* --- Navigation Hint -------------------------------------- */
#hint {
  position: fixed;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.75rem;
  color: var(--color-text-dim);
  transition: opacity 1s ease;
  z-index: var(--z-chrome);
}


/* ============================================================
   TOOLBAR
   ============================================================ */

#toolbar {
  position: fixed;
  top: 34px; right: 60px;
  display: flex;
  align-items: center;
  gap: 8px;
  z-index: var(--z-toolbar);
}

.toolbar-btn {
  padding: 5px 12px;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 4px;
  background: rgba(0,0,0,0.6);
  color: var(--color-text-secondary);
  font-size: 0.65rem;
  font-weight: var(--fw-semi);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all var(--tr-fast);
  font-family: var(--font-primary);
}

.toolbar-btn:hover { border-color: var(--color-primary-bright); color: var(--color-primary-bright); }
.toolbar-btn.active { background: var(--color-primary-bright); color: var(--color-bg-black); border-color: var(--color-primary-bright); }

#mode-indicator {
  padding: 5px 12px;
  border-radius: 4px;
  font-size: 0.65rem;
  font-weight: var(--fw-bold);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  display: none;
}

#mode-indicator.editing {
  display: block;
  background: var(--color-primary-bright);
  color: var(--color-bg-black);
  animation: pulse-glow 2s ease-in-out infinite;
}

@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 4px rgba(134,235,34,0.3); }
  50% { box-shadow: 0 0 12px rgba(134,235,34,0.6); }
}


/* ============================================================
   EDIT MODE
   ============================================================ */

.edit-mode [data-content] {
  outline: 2px dashed rgba(134,235,34,0.4);
  outline-offset: 4px;
  cursor: text;
  border-radius: 4px;
  transition: outline-color var(--tr-fast);
  min-height: 1em;
}

.edit-mode [data-content]:hover { outline-color: rgba(134,235,34,0.7); }
.edit-mode [data-content]:focus { outline-color: var(--color-primary-bright); outline-style: solid; background: rgba(134,235,34,0.05); }


/* ============================================================
   FORM PANEL (left side)
   ============================================================ */

#form-panel {
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: 380px;
  background: var(--color-panel-bg);
  border-right: 1px solid rgba(255,255,255,0.1);
  transform: translateX(-100%);
  transition: transform var(--tr-normal);
  z-index: var(--z-panel);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#form-panel.open { transform: translateX(0); }

.panel-header {
  padding: 16px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.panel-title {
  font-size: 0.75rem;
  font-weight: var(--fw-bold);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--color-primary-bright);
}

.panel-close {
  background: none; border: none;
  color: var(--color-text-secondary);
  cursor: pointer;
  font-size: 1.2rem;
  padding: 4px;
}

.panel-close:hover { color: var(--color-white); }

.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
}

.form-group {
  margin-bottom: 16px;
}

.form-label {
  display: block;
  font-size: 0.65rem;
  font-weight: var(--fw-semi);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--color-text-secondary);
  margin-bottom: 6px;
}

.form-textarea {
  width: 100%;
  min-height: 60px;
  padding: 10px 12px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 4px;
  color: var(--color-white);
  font-family: var(--font-primary);
  font-size: 0.8rem;
  line-height: 1.5;
  resize: vertical;
}

.form-textarea:focus { outline: none; border-color: var(--color-primary-bright); }

.panel-page-id {
  font-size: 0.6rem;
  color: var(--color-text-dim);
  font-family: monospace;
  margin-bottom: 12px;
  padding: 4px 8px;
  background: rgba(255,255,255,0.04);
  border-radius: 2px;
  display: inline-block;
}


/* ============================================================
   COMMENT PANEL (right side)
   ============================================================ */

#comment-panel {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: 360px;
  background: var(--color-panel-bg);
  border-left: 1px solid rgba(255,255,255,0.1);
  transform: translateX(100%);
  transition: transform var(--tr-normal);
  z-index: var(--z-panel);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#comment-panel.open { transform: translateX(0); }

.comment-list {
  flex: 1;
  overflow-y: auto;
  padding: 12px 20px;
}

.comment-item {
  padding: 12px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.comment-time {
  font-size: 0.6rem;
  color: var(--color-text-dim);
  margin-bottom: 4px;
}

.comment-text {
  font-size: 0.8rem;
  color: var(--color-text-body);
  line-height: 1.5;
}

.comment-delete {
  background: none; border: none;
  color: var(--color-text-dim);
  cursor: pointer;
  font-size: 0.65rem;
  float: right;
  padding: 2px 6px;
}

.comment-delete:hover { color: rgba(255,100,100,0.8); }

.comment-empty {
  text-align: center;
  color: var(--color-text-dim);
  font-size: 0.8rem;
  padding: var(--sp-xl) 0;
}

.comment-input-area {
  flex-shrink: 0;
  padding: 12px 20px;
  border-top: 1px solid rgba(255,255,255,0.08);
  display: flex;
  gap: 8px;
}

.comment-input-area textarea {
  flex: 1;
  min-height: 40px;
  padding: 8px 12px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 4px;
  color: var(--color-white);
  font-family: var(--font-primary);
  font-size: 0.8rem;
  resize: none;
}

.comment-input-area textarea:focus { outline: none; border-color: var(--color-secondary); }

.comment-add-btn {
  padding: 8px 14px;
  background: var(--color-secondary);
  border: none;
  border-radius: 4px;
  color: var(--color-white);
  font-size: 0.7rem;
  font-weight: var(--fw-semi);
  cursor: pointer;
  white-space: nowrap;
  font-family: var(--font-primary);
}

.comment-add-btn:hover { background: #0090c4; }


/* ============================================================
   TOAST NOTIFICATION
   ============================================================ */

#toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  padding: 10px 24px;
  background: var(--color-bg-dark);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 6px;
  font-size: 0.8rem;
  color: var(--color-white);
  z-index: var(--z-toast);
  transition: transform var(--tr-normal);
  pointer-events: none;
}

#toast.visible { transform: translateX(-50%) translateY(0); }


/* ============================================================
   PRINT STYLES
   ============================================================ */

@media print {
  body { overflow: visible; background: white; }
  .deck { position: static; width: auto; height: auto; overflow: visible; display: block; }
  .deck-scaler { transform: none !important; width: auto; height: auto; }

  .slide {
    position: relative !important;
    opacity: 1 !important;
    pointer-events: auto !important;
    page-break-after: always;
    break-after: page;
    width: 13.333in;
    height: 7.5in;
    overflow: hidden;
  }

  #conf-bar, #progress, #dots, #counter, #hint,
  #logo-mark, #toolbar, .nav-btn,
  #form-panel, #comment-panel, #toast { display: none !important; }

  .slide::before { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
  .circle-motif { print-color-adjust: exact; -webkit-print-color-adjust: exact; }

  @page { size: 13.333in 7.5in; margin: 0; }
}


</style>
</head>
<body>

<!-- ============================================================
     NAVIGATION CHROME
     ============================================================ -->
<div id="conf-bar">CONFIDENTIAL</div>
<div id="progress"></div>
<div id="dots"></div>
<div id="hint">Use arrow keys to navigate &bull; E to edit &bull; C for comments</div>

<!-- Navigation Buttons -->
<button class="nav-btn" id="prev-btn" aria-label="Previous slide">&#8249;</button>
<button class="nav-btn" id="next-btn" aria-label="Next slide">&#8250;</button>
<div id="counter"></div>

<!-- ============================================================
     TOOLBAR
     ============================================================ -->
<div id="toolbar">
  <span id="mode-indicator"></span>
  <button class="toolbar-btn" id="btn-edit" title="Toggle edit mode (E)">Edit</button>
  <button class="toolbar-btn" id="btn-form" title="Toggle form panel (F)">Fields</button>
  <button class="toolbar-btn" id="btn-comment" title="Toggle comments (C)">Notes</button>
  <button class="toolbar-btn" id="btn-save" title="Save to file (S)">Save</button>
  <button class="toolbar-btn" id="btn-snapshot" title="Export standalone HTML">Snapshot</button>
</div>

<!-- ============================================================
     FORM PANEL (left)
     ============================================================ -->
<div id="form-panel">
  <div class="panel-header">
    <span class="panel-title">Edit Content</span>
    <button class="panel-close" id="form-close">&times;</button>
  </div>
  <div class="panel-body" id="form-body">
    <!-- Populated dynamically per slide -->
  </div>
</div>

<!-- ============================================================
     COMMENT PANEL (right)
     ============================================================ -->
<div id="comment-panel">
  <div class="panel-header">
    <span class="panel-title" id="comment-panel-title">Notes</span>
    <button class="panel-close" id="comment-close">&times;</button>
  </div>
  <div class="comment-list" id="comment-list">
    <!-- Populated dynamically -->
  </div>
  <div class="comment-input-area">
    <textarea id="comment-input" placeholder="Add a note..." rows="2"></textarea>
    <button class="comment-add-btn" id="comment-add">Add</button>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>


<!-- ============================================================
     SLIDE DECK
     ============================================================

     INSTRUCTIONS FOR CLAUDE:
     ========================
     1. Add <section> elements below inside the .deck div.
     2. Each section MUST have:
        - class="slide" + a type class (e.g. slide-title, slide-content)
        - data-page-id="unique-kebab-case-id"
     3. Bind text to content JSON using data-content="pageId.fieldName"
     4. Populate the JSON in <script id="presentation-content">

     AVAILABLE SLIDE TYPES:
       slide-title             — Hero title (bottom-aligned), bg-black
       slide-title-centered    — Centered hero title, bg-black
       slide-divider           — Section break with act label
       slide-content           — Default full-width content, bg-dark
       slide-callout           — Large statement/quote
       slide-stats             — Big stat numbers
       slide-numbered-list     — Numbered action items
       slide-timeline          — Horizontal timeline
       slide-comparison        — Side-by-side columns
       slide-diagram           — SVG diagram area
       slide-end               — Closing slide

     LAYOUT MODIFIERS (add to slide-content):
       layout-two-col          — 1.3fr / 1fr grid
       layout-two-col-equal    — 1fr / 1fr grid
       layout-three-col        — Three equal columns
       layout-sidebar          — 2fr / 1fr with sidebar

     BACKGROUND CLASSES:
       bg-black, bg-dark, bg-darker, bg-green

     INNER COMPONENTS:
       .card, .col-card, .callout-box, .highlight-box,
       .point-list, .insight-list, .card-grid-2/.card-grid-3,
       .green-bar, .brand-line, .brand-mark,
       .stat-grid-2/3/4, .stat-block, .ask-list + .ask-item,
       .timeline + .timeline-node, .comparison-grid,
       .circle-motif, .slide-footer

     ============================================================ -->

<div class="deck" id="deck">
<div class="deck-scaler" id="deck-scaler">
  <div id="logo-mark" data-content="meta.logo"></div>

  <!-- ==========================================================
       EXAMPLE: Title Slide
       Replace data-page-id and data-content values for your presentation.
       ========================================================== -->
  <section class="slide slide-title active" data-page-id="title">
    <!-- Decorative circles (optional — adjust size/position/color) -->
    <div class="circle-motif" style="width:450px;height:450px;top:-80px;right:-60px;border-color:rgba(134,188,37,0.08);"></div>
    <div class="circle-motif" style="width:300px;height:300px;top:60px;right:80px;border-color:rgba(0,163,224,0.06);"></div>

    <div class="display" data-content="title.heading"><!-- Title text from JSON --></div>
    <div class="brand-line"></div>
    <div class="subtitle" data-content="title.subtitle"><!-- Subtitle from JSON --></div>
    <div class="slide-footer gradient"></div>
  </section>

  <!-- ==========================================================
       EXAMPLE: Section Divider
       ========================================================== -->
  <section class="slide slide-divider" data-page-id="section-1">
    <div class="circle-motif" style="width:500px;height:500px;bottom:-180px;right:-100px;border-color:rgba(134,235,34,0.06);"></div>
    <div class="act-label" data-content="section-1.label"><!-- e.g. SECTION ONE --></div>
    <div class="display" data-content="section-1.heading"><!-- Section heading --></div>
    <div class="act-bar green"></div>
  </section>

  <!-- ==========================================================
       EXAMPLE: Content Slide (full-width)
       ========================================================== -->
  <section class="slide slide-content bg-dark" data-page-id="content-1">
    <div class="circle-motif" style="width:350px;height:350px;top:-40px;right:-60px;border-color:rgba(134,188,37,0.06);"></div>
    <div class="label" data-content="content-1.label"><!-- Section label --></div>
    <div class="h1" data-content="content-1.heading"><!-- Slide heading --></div>
    <div class="green-bar"></div>
    <div class="body-text" data-content="content-1.body"><!-- Body text --></div>
    <div class="slide-footer"></div>
  </section>

  <!-- ==========================================================
       EXAMPLE: Two-Column Layout
       ========================================================== -->
  <section class="slide slide-content layout-two-col bg-dark" data-page-id="two-col-example">
    <div class="label" data-content="two-col-example.label"><!-- Label --></div>
    <div class="h1" data-content="two-col-example.heading"><!-- Heading --></div>
    <div class="green-bar"></div>
    <div class="slide-body">
      <div>
        <div class="body-text" data-content="two-col-example.col-left"><!-- Left column --></div>
      </div>
      <div>
        <div class="body-text" data-content="two-col-example.col-right"><!-- Right column --></div>
      </div>
    </div>
    <div class="slide-footer"></div>
  </section>

  <!-- ==========================================================
       EXAMPLE: Card Grid Slide
       ========================================================== -->
  <section class="slide slide-content bg-darker" data-page-id="cards-example">
    <div class="label" data-content="cards-example.label"><!-- Label --></div>
    <div class="h1" data-content="cards-example.heading"><!-- Heading --></div>
    <div class="green-bar small"></div>
    <div class="card-grid card-grid-3">
      <div class="card">
        <div class="card-accent-rule"></div>
        <div class="h3" data-content="cards-example.card-1-title"><!-- Card 1 --></div>
        <div class="small-text" data-content="cards-example.card-1-body"><!-- Card 1 body --></div>
      </div>
      <div class="card">
        <div class="card-accent-rule blue"></div>
        <div class="h3" data-content="cards-example.card-2-title"><!-- Card 2 --></div>
        <div class="small-text" data-content="cards-example.card-2-body"><!-- Card 2 body --></div>
      </div>
      <div class="card">
        <div class="card-accent-rule teal"></div>
        <div class="h3" data-content="cards-example.card-3-title"><!-- Card 3 --></div>
        <div class="small-text" data-content="cards-example.card-3-body"><!-- Card 3 body --></div>
      </div>
    </div>
    <div class="slide-footer blue"></div>
  </section>

  <!-- ==========================================================
       EXAMPLE: Callout Slide
       ========================================================== -->
  <section class="slide slide-callout bg-dark" data-page-id="callout-example">
    <div class="circle-motif" style="width:600px;height:600px;bottom:-200px;left:-200px;border-color:rgba(134,235,34,0.05);"></div>
    <div class="label" data-content="callout-example.label"><!-- Label --></div>
    <div class="callout-text" data-content="callout-example.statement"><!-- Big statement --></div>
    <div class="slide-footer gradient"></div>
  </section>

  <!-- ==========================================================
       EXAMPLE: Stats Slide
       ========================================================== -->
  <section class="slide slide-stats bg-darker" data-page-id="stats-example">
    <div class="label" data-content="stats-example.label"><!-- Label --></div>
    <div class="h1" data-content="stats-example.heading"><!-- Heading --></div>
    <div class="green-bar"></div>
    <div class="stat-grid stat-grid-3">
      <div class="stat-block">
        <div class="stat-number" data-content="stats-example.stat-1-number"><!-- e.g. 47% --></div>
        <div class="stat-label" data-content="stats-example.stat-1-label"><!-- Label --></div>
      </div>
      <div class="stat-block">
        <div class="stat-number" data-content="stats-example.stat-2-number"><!-- e.g. 3.2x --></div>
        <div class="stat-label" data-content="stats-example.stat-2-label"><!-- Label --></div>
      </div>
      <div class="stat-block">
        <div class="stat-number" data-content="stats-example.stat-3-number"><!-- e.g. $12M --></div>
        <div class="stat-label" data-content="stats-example.stat-3-label"><!-- Label --></div>
      </div>
    </div>
    <div class="slide-footer"></div>
  </section>

  <!-- ==========================================================
       EXAMPLE: Numbered List Slide
       ========================================================== -->

<!-- ============================================================
     JAVASCRIPT ENGINE
     ============================================================ -->
<script>
(function() {
  'use strict';

  /* ==========================================================
     CONTENT STORE
     Reads from embedded <script id="presentation-content">.
     Saves to localStorage. On file-save, updates the embedded
     script block so the HTML file itself contains current data.
     ========================================================== */
  class ContentStore {
    constructor() {
      const raw = document.getElementById('presentation-content').textContent;
      this.original = JSON.parse(raw);
      this.slug = this.original.meta?.slug || 'presentation';
      this.storageKey = `dl-pres-content-${this.slug}`;
      this.dirty = false;

      // Load from localStorage if edits exist, else use embedded
      const saved = localStorage.getItem(this.storageKey);
      if (saved) {
        try { this.data = JSON.parse(saved); } catch(e) { this.data = structuredClone(this.original); }
      } else {
        this.data = structuredClone(this.original);
      }
    }

    get(pageId, field) {
      return this.data.pages?.[pageId]?.[field] ?? '';
    }

    set(pageId, field, value) {
      if (!this.data.pages[pageId]) this.data.pages[pageId] = {};
      this.data.pages[pageId][field] = value;
      this.dirty = true;
    }

    getPageFields(pageId) {
      return this.data.pages?.[pageId] ? Object.entries(this.data.pages[pageId]) : [];
    }

    save() {
      localStorage.setItem(this.storageKey, JSON.stringify(this.data));
      this.dirty = true;
    }

    /** Bake current data into the embedded script element (for file save). */
    bakeIntoDOM() {
      const el = document.getElementById('presentation-content');
      if (el) el.textContent = JSON.stringify(this.data, null, 2);
    }

    reset() {
      this.data = structuredClone(this.original);
      localStorage.removeItem(this.storageKey);
      this.dirty = true;
    }

    exportJSON() {
      const blob = new Blob([JSON.stringify(this.data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${this.slug}-content.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    importJSON(json) {
      this.data = json;
      this.save();
    }

    getMeta() { return this.data.meta || {}; }
  }


  /* ==========================================================
     CONTENT BINDER
     Binds data-content attributes to DOM elements.
     ========================================================== */
  class ContentBinder {
    constructor(store) {
      this.store = store;
    }

    renderAll() {
      document.querySelectorAll('[data-content]').forEach(el => {
        const [pageId, field] = el.dataset.content.split('.');
        if (pageId && field) {
          const val = this.store.get(pageId, field);
          if (val) el.innerHTML = val;
        }
      });

      const meta = this.store.getMeta();
      const confBar = document.getElementById('conf-bar');
      if (meta.confidential) confBar.textContent = meta.confidential;
      if (meta.date) confBar.textContent += ` \u2014 ${meta.date}`;
      const logoEl = document.getElementById('logo-mark');
      if (meta.logo && logoEl) logoEl.innerHTML = meta.logo;
    }

    renderPage(pageId) {
      document.querySelectorAll(`[data-page-id="${pageId}"] [data-content]`).forEach(el => {
        const parts = el.dataset.content.split('.');
        if (parts.length === 2) {
          const val = this.store.get(parts[0], parts[1]);
          if (val !== undefined) el.innerHTML = val;
        }
      });
    }

    readFromDOM() {
      const allowedTags = ['EM', 'STRONG', 'BR', 'SPAN'];
      document.querySelectorAll('[data-content]').forEach(el => {
        const [pageId, field] = el.dataset.content.split('.');
        if (pageId && field) {
          const temp = document.createElement('div');
          temp.innerHTML = el.innerHTML;
          this._sanitize(temp, allowedTags);
          this.store.set(pageId, field, temp.innerHTML);
        }
      });
    }

    _sanitize(node, allowed) {
      const children = Array.from(node.childNodes);
      children.forEach(child => {
        if (child.nodeType === 1) {
          if (!allowed.includes(child.tagName)) {
            const text = document.createTextNode(child.textContent);
            node.replaceChild(text, child);
          } else {
            const attrs = Array.from(child.attributes);
            attrs.forEach(attr => {
              if (!(child.tagName === 'SPAN' && attr.name === 'class') &&
                  !(child.tagName === 'SPAN' && attr.name === 'style')) {
                child.removeAttribute(attr.name);
              }
            });
            this._sanitize(child, allowed);
          }
        }
      });
    }
  }


  /* ==========================================================
     NAVIGATION ENGINE
     ========================================================== */
  class NavigationEngine {
    constructor() {
      this.slides = Array.from(document.querySelectorAll('.slide'));
      this.total = this.slides.length;
      this.current = 0;
      this.locked = false;

      this._buildDots();
      this._bindKeys();
      this._bindButtons();
      this._update();
    }

    goTo(n) {
      if (this.locked || n < 0 || n >= this.total || n === this.current) return;
      this.slides[this.current].classList.remove('active');
      this.current = n;
      this.slides[this.current].classList.add('active');
      this._update();
      this._dismissHint();
      document.dispatchEvent(new CustomEvent('slide-change', { detail: { index: n, pageId: this.currentPageId() } }));
    }

    currentPageId() {
      return this.slides[this.current]?.dataset.pageId || '';
    }

    lock()   { this.locked = true; }
    unlock() { this.locked = false; }

    _update() {
      document.getElementById('counter').textContent = `${this.current + 1} / ${this.total}`;
      document.getElementById('progress').style.width = `${((this.current + 1) / this.total) * 100}%`;
      this.dots.forEach((d, i) => d.classList.toggle('active', i === this.current));
    }

    _buildDots() {
      const container = document.getElementById('dots');
      container.innerHTML = '';
      this.dots = this.slides.map((_, i) => {
        const dot = document.createElement('div');
        dot.className = 'dot' + (i === 0 ? ' active' : '');
        dot.addEventListener('click', () => this.goTo(i));
        container.appendChild(dot);
        return dot;
      });
    }

    _bindKeys() {
      document.addEventListener('keydown', (e) => {
        if (this.locked) return;
        if (e.key >= '1' && e.key <= '9') {
          const n = parseInt(e.key) - 1;
          if (n < this.total) { e.preventDefault(); this.goTo(n); }
          return;
        }
        switch(e.key) {
          case 'ArrowRight': case 'ArrowDown': case ' ': case 'PageDown':
            e.preventDefault(); this.goTo(this.current + 1); break;
          case 'ArrowLeft': case 'ArrowUp': case 'PageUp':
            e.preventDefault(); this.goTo(this.current - 1); break;
          case 'Home':
            e.preventDefault(); this.goTo(0); break;
          case 'End':
            e.preventDefault(); this.goTo(this.total - 1); break;
        }
      });
    }

    _bindButtons() {
      document.getElementById('prev-btn').addEventListener('click', () => this.goTo(this.current - 1));
      document.getElementById('next-btn').addEventListener('click', () => this.goTo(this.current + 1));
    }

    _dismissHint() {
      const hint = document.getElementById('hint');
      if (hint.style.opacity !== '0') {
        hint.style.opacity = '0';
        setTimeout(() => hint.style.display = 'none', 1000);
      }
    }
  }


  /* ==========================================================
     EDIT CONTROLLER
     ========================================================== */
  class EditController {
    constructor(store, binder, nav) {
      this.store = store;
      this.binder = binder;
      this.nav = nav;
      this.active = false;
    }

    toggle() { this.active ? this.deactivate() : this.activate(); }

    activate() {
      this.active = true;
      this.nav.lock();
      document.body.classList.add('edit-mode');
      document.querySelectorAll('[data-content]').forEach(el => el.contentEditable = 'true');
      document.getElementById('mode-indicator').className = 'editing';
      document.getElementById('mode-indicator').textContent = 'EDITING';
      document.getElementById('btn-edit').classList.add('active');
    }

    deactivate() {
      this.active = false;
      this.nav.unlock();
      document.body.classList.remove('edit-mode');
      document.querySelectorAll('[data-content]').forEach(el => { el.contentEditable = 'false'; el.blur(); });
      document.getElementById('mode-indicator').className = '';
      document.getElementById('btn-edit').classList.remove('active');
    }

    save() {
      this.binder.readFromDOM();
      this.store.save();
      this.deactivate();
      return true;
    }

    discard() {
      this.deactivate();
      this.binder.renderAll();
    }
  }


  /* ==========================================================
     COMMENT SYSTEM
     Reads from embedded <script id="presentation-comments">.
     Saves to localStorage. On file-save, bakes comments back
     into the embedded script so the HTML file has them.
     ========================================================== */
  class CommentSystem {
    constructor(store) {
      this.slug = store.slug;
      this.storageKey = `dl-pres-comments-${this.slug}`;
      this.open = false;
      this.currentPageId = '';

      // Load: localStorage first (has latest), fall back to embedded
      const saved = localStorage.getItem(this.storageKey);
      if (saved) {
        try { this.comments = JSON.parse(saved); } catch(e) { this.comments = {}; }
      } else {
        // Read from embedded script block
        try {
          const raw = document.getElementById('presentation-comments').textContent;
          this.comments = JSON.parse(raw) || {};
        } catch(e) { this.comments = {}; }
      }

      this._bindUI();
    }

    toggle() { this.open ? this.close() : this.openPanel(); }

    openPanel() {
      this.open = true;
      document.getElementById('comment-panel').classList.add('open');
      document.getElementById('btn-comment').classList.add('active');
      this.renderForPage(this.currentPageId);
    }

    close() {
      this.open = false;
      document.getElementById('comment-panel').classList.remove('open');
      document.getElementById('btn-comment').classList.remove('active');
    }

    setPage(pageId) {
      this.currentPageId = pageId;
      if (this.open) this.renderForPage(pageId);
    }

    addComment(text) {
      if (!text.trim()) return;
      if (!this.comments[this.currentPageId]) this.comments[this.currentPageId] = [];
      this.comments[this.currentPageId].push({
        id: Date.now().toString(36),
        text: text.trim(),
        time: new Date().toLocaleString()
      });
      this._save();
      this.renderForPage(this.currentPageId);
    }

    deleteComment(pageId, commentId) {
      if (!this.comments[pageId]) return;
      this.comments[pageId] = this.comments[pageId].filter(c => c.id !== commentId);
      if (this.comments[pageId].length === 0) delete this.comments[pageId];
      this._save();
      this.renderForPage(this.currentPageId);
    }

    renderForPage(pageId) {
      const title = document.getElementById('comment-panel-title');
      title.textContent = `Notes \u2014 ${pageId}`;

      const list = document.getElementById('comment-list');
      const items = this.comments[pageId] || [];

      if (items.length === 0) {
        list.innerHTML = '<div class="comment-empty">No notes for this slide</div>';
      } else {
        list.innerHTML = items.map(c => `
          <div class="comment-item">
            <button class="comment-delete" data-id="${c.id}">&times;</button>
            <div class="comment-time">${c.time}</div>
            <div class="comment-text">${this._escapeHTML(c.text)}</div>
          </div>
        `).join('');

        list.querySelectorAll('.comment-delete').forEach(btn => {
          btn.addEventListener('click', () => this.deleteComment(pageId, btn.dataset.id));
        });
      }
    }

    getCount(pageId) {
      return (this.comments[pageId] || []).length;
    }

    /** Bake current comments into the embedded script element (for file save). */
    bakeIntoDOM() {
      const el = document.getElementById('presentation-comments');
      if (el) el.textContent = JSON.stringify(this.comments, null, 2);
    }

    _save() {
      localStorage.setItem(this.storageKey, JSON.stringify(this.comments));
    }

    _bindUI() {
      document.getElementById('comment-close').addEventListener('click', () => this.close());
      document.getElementById('comment-add').addEventListener('click', () => {
        const input = document.getElementById('comment-input');
        this.addComment(input.value);
        input.value = '';
      });
      document.getElementById('comment-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          document.getElementById('comment-add').click();
        }
        e.stopPropagation();
      });
    }

    _escapeHTML(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  }


  /* ==========================================================
     FORM PANEL
     ========================================================== */
  class FormPanel {
    constructor(store, binder) {
      this.store = store;
      this.binder = binder;
      this.open = false;
      this.currentPageId = '';

      document.getElementById('form-close').addEventListener('click', () => this.close());
    }

    toggle() { this.open ? this.close() : this.openPanel(); }

    openPanel() {
      this.open = true;
      document.getElementById('form-panel').classList.add('open');
      document.getElementById('btn-form').classList.add('active');
      this.renderForPage(this.currentPageId);
    }

    close() {
      if (this.open) this._readFormValues();
      this.open = false;
      document.getElementById('form-panel').classList.remove('open');
      document.getElementById('btn-form').classList.remove('active');
    }

    setPage(pageId) {
      if (this.open && this.currentPageId) this._readFormValues();
      this.currentPageId = pageId;
      if (this.open) this.renderForPage(pageId);
    }

    renderForPage(pageId) {
      const body = document.getElementById('form-body');
      const fields = this.store.getPageFields(pageId);

      let html = `<div class="panel-page-id">data-page-id: ${pageId}</div>`;

      if (fields.length === 0) {
        html += '<div class="comment-empty">No content fields on this slide</div>';
      } else {
        fields.forEach(([key, value]) => {
          const plainText = value.replace(/<[^>]*>/g, match => {
            if (match.includes('class="accent"')) return '[accent]';
            if (match === '</span>') return '[/accent]';
            if (match === '<em>') return '[em]';
            if (match === '</em>') return '[/em]';
            if (match === '<strong>') return '[strong]';
            if (match === '</strong>') return '[/strong]';
            if (match === '<br>') return '\n';
            return '';
          });

          html += `
            <div class="form-group">
              <label class="form-label">${key}</label>
              <textarea class="form-textarea" data-form-field="${pageId}.${key}"
                rows="${plainText.length > 80 ? 4 : 2}">${plainText}</textarea>
            </div>
          `;
        });
      }

      body.innerHTML = html;

      body.querySelectorAll('.form-textarea').forEach(ta => {
        ta.addEventListener('input', () => this._syncField(ta));
        ta.addEventListener('keydown', e => e.stopPropagation());
      });
    }

    _syncField(textarea) {
      const [pageId, field] = textarea.dataset.formField.split('.');
      let val = textarea.value
        .replace(/\[accent\](.*?)\[\/accent\]/g, '<span class="accent">$1</span>')
        .replace(/\[em\](.*?)\[\/em\]/g, '<em>$1</em>')
        .replace(/\[strong\](.*?)\[\/strong\]/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');

      this.store.set(pageId, field, val);
      this.store.save();

      const el = document.querySelector(`[data-content="${pageId}.${field}"]`);
      if (el) el.innerHTML = val;
    }

    _readFormValues() {
      document.querySelectorAll('#form-body .form-textarea').forEach(ta => {
        this._syncField(ta);
      });
    }
  }


  /* ==========================================================
     FILE SAVER
     Uses showSaveFilePicker to write HTML back to disk.
     First save shows a dialog; subsequent saves in the same
     session go to the same file with no prompt.
     Falls back to download if API unavailable.
     ========================================================== */
  class FileSaver {
    constructor(store, comments) {
      this.store = store;
      this.comments = comments;
      this.fileHandle = null;
      this.filename = decodeURIComponent(location.pathname.split('/').pop()) || `${store.slug}.html`;
    }

    async save() {
      this.store.bakeIntoDOM();
      this.comments.bakeIntoDOM();

      const slides = document.querySelectorAll('.slide');
      const dots = document.querySelectorAll('.dot');
      const currentActive = document.querySelector('.slide.active');
      const currentDot = document.querySelector('.dot.active');
      slides.forEach(s => s.classList.remove('active'));
      dots.forEach((d, i) => d.classList.toggle('active', i === 0));
      if (slides[0]) slides[0].classList.add('active');

      const html = `<!DOCTYPE html>\n${document.documentElement.outerHTML}`;

      // Restore user's current view
      slides.forEach(s => s.classList.remove('active'));
      dots.forEach(d => d.classList.remove('active'));
      if (currentActive) currentActive.classList.add('active');
      if (currentDot) currentDot.classList.add('active');

      if ('showSaveFilePicker' in window) {
        try {
          if (!this.fileHandle) {
            this.fileHandle = await window.showSaveFilePicker({
              suggestedName: this.filename,
              types: [{ description: 'HTML', accept: { 'text/html': ['.html'] } }]
            });
          }
          const writable = await this.fileHandle.createWritable();
          await writable.write(html);
          await writable.close();
          this.store.dirty = false;
          return true;
        } catch(e) {
          if (e.name === 'AbortError') return false;
        }
      }

      const blob = new Blob([html], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = this.filename;
      a.click();
      URL.revokeObjectURL(url);
      this.store.dirty = false;
      return true;
    }
  }


  /* ==========================================================
     TOAST
     ========================================================== */
  function toast(msg, duration = 2500) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('visible');
    setTimeout(() => el.classList.remove('visible'), duration);
  }


  /* ==========================================================
     APP — Orchestrator
     ========================================================== */
  // Scale the 1280x720 slide box to fit the viewport
  function scaleDeck() {
    const scaler = document.getElementById('deck-scaler');
    if (!scaler) return;
    const vw = window.innerWidth || document.documentElement.clientWidth || 1280;
    const vh = window.innerHeight || document.documentElement.clientHeight || 720;
    const scale = Math.min(vw / 1280, vh / 720);
    const offsetX = (vw - 1280 * scale) / 2;
    const offsetY = (vh - 720 * scale) / 2;
    scaler.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
  }
  window.addEventListener('resize', scaleDeck);
  scaleDeck();

  class App {
    constructor() {
      this.store = new ContentStore();
      this.binder = new ContentBinder(this.store);
      this.nav = new NavigationEngine();
      this.editor = new EditController(this.store, this.binder, this.nav);
      this.comments = new CommentSystem(this.store);
      this.formPanel = new FormPanel(this.store, this.binder);
      this.fileSaver = new FileSaver(this.store, this.comments);

      // Initial render
      this.binder.renderAll();
      this.comments.setPage(this.nav.currentPageId());
      this.formPanel.setPage(this.nav.currentPageId());

      // On slide change
      document.addEventListener('slide-change', (e) => {
        this.comments.setPage(e.detail.pageId);
        this.formPanel.setPage(e.detail.pageId);
      });

      this._bindToolbar();
      this._bindGlobalKeys();
    }

    _bindToolbar() {
      document.getElementById('btn-edit').addEventListener('click', () => {
        if (this.editor.active) {
          this.editor.save();
          toast('Content saved');
        } else {
          this.editor.toggle();
        }
      });

      document.getElementById('btn-form').addEventListener('click', () => this.formPanel.toggle());
      document.getElementById('btn-comment').addEventListener('click', () => this.comments.toggle());

      document.getElementById('btn-save').addEventListener('click', () => this._saveToFile());

      document.getElementById('btn-snapshot').addEventListener('click', () => {
        this._exportSnapshot();
      });
    }

    async _saveToFile() {
      const ok = await this.fileSaver.save();
      if (ok) toast('Saved to file');
    }

    _bindGlobalKeys() {
      document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
        if (e.target.contentEditable === 'true' && this.editor.active) return;

        switch(e.key) {
          case 'e': case 'E':
            e.preventDefault();
            if (this.editor.active) {
              this.editor.save();
              toast('Content saved');
            } else {
              this.editor.toggle();
              toast('Edit mode ON \u2014 press E again to save');
            }
            break;
          case 'f': case 'F':
            if (!this.editor.active) {
              e.preventDefault();
              this.formPanel.toggle();
            }
            break;
          case 'c': case 'C':
            if (!this.editor.active) {
              e.preventDefault();
              this.comments.toggle();
            }
            break;
          case 's': case 'S':
            if (!this.editor.active) {
              e.preventDefault();
              this._saveToFile();
            }
            break;
          case 'Escape':
            if (this.editor.active) {
              this.editor.discard();
              toast('Edits discarded');
            }
            if (this.formPanel.open) this.formPanel.close();
            if (this.comments.open) this.comments.close();
            break;
        }
      });
    }

    _exportSnapshot() {
      this.store.bakeIntoDOM();
      this.comments.bakeIntoDOM();

      // Reset to slide 1 before serializing
      const slides = document.querySelectorAll('.slide');
      const dots = document.querySelectorAll('.dot');
      const currentActive = document.querySelector('.slide.active');
      const currentDot = document.querySelector('.dot.active');
      slides.forEach(s => s.classList.remove('active'));
      dots.forEach((d, i) => d.classList.toggle('active', i === 0));
      if (slides[0]) slides[0].classList.add('active');

      const html = document.documentElement.outerHTML;

      // Restore user's current view
      slides.forEach(s => s.classList.remove('active'));
      dots.forEach(d => d.classList.remove('active'));
      if (currentActive) currentActive.classList.add('active');
      if (currentDot) currentDot.classList.add('active');

      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');

      const removeIds = ['form-panel', 'comment-panel', 'toolbar', 'toast'];
      removeIds.forEach(id => {
        const el = doc.getElementById(id);
        if (el) el.remove();
      });

      // Clear comments from the snapshot
      const commentsScript = doc.getElementById('presentation-comments');
      if (commentsScript) commentsScript.textContent = '{}';

      const blob = new Blob([`<!DOCTYPE html>\n${doc.documentElement.outerHTML}`], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${this.store.slug}-snapshot.html`;
      a.click();
      URL.revokeObjectURL(url);
      toast('Snapshot exported');
    }
  }

  // Boot — clear localStorage on load so embedded JSON is always the source of truth
  document.addEventListener('DOMContentLoaded', () => {
    const slug = JSON.parse(document.getElementById('presentation-content').textContent).meta?.slug || 'presentation';
    localStorage.removeItem(`dl-pres-content-${slug}`);
    localStorage.removeItem(`dl-pres-comments-${slug}`);
    new App();
  });

})();
</script>
