<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warm Earthy Presentation Template</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Lora:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   THEME CSS - Injected by generate-template skill
   ============================================================ */
/* ============================================================
   THEME: Warm Earthy
   Version: 1.0
   Fonts: https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Lora:ital,wght@0,700;1,700&display=swap
   ============================================================ */

/* --- Brand Tokens --- */
:root {
  /* Colors */
  --color-primary: #B8860B;
  --color-primary-bright: #D4A017;
  --color-secondary: #C2603F;
  --color-tertiary: #7C8A52;
  --color-bg-black: #1A1510;
  --color-bg-dark: #2A231B;
  --color-bg-darker: #211A13;
  --color-bg-alt: #1E1812;
  --color-gray: #8B7D6B;
  --color-white: #FAF3E8;
  --color-text-primary: #FAF3E8;
  --color-text-secondary: #A89880;
  --color-text-dim: rgba(250,243,232,0.35);
  --color-text-body: #C9B99A;

  /* Gradients */
  --gradient-primary: linear-gradient(135deg, #B8860B, #D4A017);
  --gradient-secondary: linear-gradient(135deg, #D4A017, #C2603F);
  --gradient-full: linear-gradient(135deg, #B8860B, #D4A017, #C2603F);

  /* Typography */
  --font-primary: 'Inter', Arial, Helvetica, sans-serif;
  --font-accent: 'Lora', Georgia, serif;
  --fw-light: 300;
  --fw-regular: 400;
  --fw-semi: 600;
  --fw-bold: 700;

  /* Type Scale (fluid) */
  --fs-display: clamp(2.2rem, 5vw, 3.8rem);
  --fs-h1: clamp(1.6rem, 3.5vw, 2.6rem);
  --fs-h2: clamp(1.1rem, 2vw, 1.5rem);
  --fs-h3: clamp(1rem, 1.6vw, 1.25rem);
  --fs-body: clamp(0.9rem, 1.4vw, 1.05rem);
  --fs-small: clamp(0.8rem, 1.2vw, 0.9rem);
  --fs-label: 0.7rem;
  --fs-caption: 0.75rem;

  /* Spacing */
  --sp-xs: 8px;
  --sp-sm: 16px;
  --sp-md: 24px;
  --sp-lg: 32px;
  --sp-xl: 48px;
  --sp-2xl: 64px;
  --sp-3xl: 80px;

  /* Slide dimensions */
  --slide-pad-top: 60px;
  --slide-pad-x: 80px;
  --slide-pad-bottom: 40px;

  /* Engine chrome */
  --color-panel-bg: #241D15;
  --color-panel-border: rgba(168,152,128,0.12);
  --color-input-bg: rgba(250,243,232,0.05);
  --color-input-border: rgba(168,152,128,0.2);

  /* Transitions */
  --tr-fast: 200ms ease;
  --tr-normal: 300ms ease;
  --tr-slow: 500ms ease;

  /* Z-index layers */
  --z-slide: 1;
  --z-chrome: 100;
  --z-panel: 400;
  --z-toolbar: 300;
  --z-toast: 400;
}


/* ============================================================
   TYPOGRAPHY CLASSES
   ============================================================ */

.display {
  font-size: var(--fs-display);
  font-weight: var(--fw-light);
  line-height: 1.15;
  color: var(--color-white);
}

.h1 { font-size: var(--fs-h1); font-weight: var(--fw-bold); line-height: 1.2; color: var(--color-white); }
.h2 { font-size: var(--fs-h2); font-weight: var(--fw-bold); line-height: 1.3; color: var(--color-white); }
.h3 { font-size: var(--fs-h3); font-weight: var(--fw-bold); line-height: 1.35; color: var(--color-white); }

.body-text {
  font-size: var(--fs-body);
  font-weight: var(--fw-light);
  line-height: 1.7;
  color: var(--color-text-body);
}

.small-text { font-size: var(--fs-small); font-weight: var(--fw-regular); line-height: 1.6; color: var(--color-text-secondary); }

.label {
  font-size: var(--fs-label);
  font-weight: var(--fw-bold);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--color-primary-bright);
  margin-bottom: var(--sp-sm);
}

.accent {
  font-family: var(--font-accent);
  font-style: italic;
  font-weight: 700;
  color: var(--color-primary-bright);
}

.display .accent, .h1 .accent { color: var(--color-primary-bright); }

.subtitle {
  font-size: var(--fs-body);
  font-weight: var(--fw-light);
  color: var(--color-text-secondary);
  line-height: 1.6;
  max-width: 650px;
}


/* ============================================================
   SLIDE BACKGROUNDS
   ============================================================ */

.bg-black   { background: var(--color-bg-black); }
.bg-dark    { background: var(--color-bg-dark); }
.bg-darker  { background: var(--color-bg-darker); }
.bg-green   { background: #1E1812; }


/* ============================================================
   SLIDE TYPE: TITLE
   ============================================================ */

.slide-title {
  justify-content: flex-end;
  padding-bottom: 80px;
  background: var(--color-bg-black);
}

.slide-title .display { max-width: 800px; margin-bottom: var(--sp-md); }

.slide-title-centered {
  justify-content: center;
  align-items: center;
  text-align: center;
  background: var(--color-bg-black);
}

.slide-title-centered .display { max-width: 900px; }


/* ============================================================
   SLIDE TYPE: DIVIDER
   ============================================================ */

.slide-divider {
  justify-content: center;
  align-items: center;
  text-align: center;
  background: var(--color-bg-black);
}

.slide-divider .act-label {
  font-size: var(--fs-label);
  font-weight: var(--fw-bold);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--color-text-dim);
  margin-bottom: 20px;
}

.slide-divider .display { max-width: 800px; }

.slide-divider .act-bar {
  width: 80px;
  height: 4px;
  margin-top: var(--sp-md);
}

.act-bar.green   { background: var(--color-primary-bright); }
.act-bar.blue    { background: var(--color-secondary); }
.act-bar.gradient { background: var(--gradient-full); }


/* ============================================================
   SLIDE TYPE: CONTENT (default full-width)
   ============================================================ */

.slide-content {
  background: var(--color-bg-dark);
  padding-top: var(--sp-3xl);
}

.slide-content .slide-label { /* section label above title */ }
.slide-content .h1 { margin-bottom: var(--sp-sm); }
.slide-content .body-text { max-width: 900px; }


/* ============================================================
   SLIDE TYPE: CALLOUT (big statement)
   ============================================================ */

.slide-callout {
  justify-content: center;
  background: var(--color-bg-dark);
}

.slide-callout .callout-text {
  font-size: clamp(1.8rem, 3.5vw, 2.8rem);
  font-weight: var(--fw-light);
  line-height: 1.3;
  max-width: 800px;
  color: var(--color-white);
}

.slide-callout .callout-text .accent { font-size: inherit; }


/* ============================================================
   SLIDE TYPE: STATS (big numbers)
   ============================================================ */

.slide-stats {
  background: var(--color-bg-dark);
}

.stat-grid {
  display: grid;
  gap: var(--sp-lg);
  margin-top: var(--sp-lg);
}

.stat-grid-2 { grid-template-columns: 1fr 1fr; }
.stat-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
.stat-grid-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }

.stat-block { text-align: center; }

.stat-number {
  font-size: clamp(2.5rem, 5vw, 4rem);
  font-weight: var(--fw-bold);
  color: var(--color-primary-bright);
  line-height: 1;
  margin-bottom: var(--sp-xs);
}

.stat-label {
  font-size: var(--fs-small);
  color: var(--color-text-secondary);
  font-weight: var(--fw-regular);
}


/* ============================================================
   SLIDE TYPE: NUMBERED LIST
   ============================================================ */

.slide-numbered-list { background: var(--color-bg-dark); }

.ask-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: var(--sp-sm);
  margin-top: var(--sp-lg);
  max-width: 900px;
}

.ask-item {
  display: flex;
  align-items: flex-start;
  gap: 20px;
  padding: 20px 24px;
  border-left: 3px solid var(--color-primary-bright);
  background: rgba(250,243,232,0.04);
  border-radius: 0 4px 4px 0;
}

.ask-item.blue { border-left-color: var(--color-secondary); }

.ask-number {
  font-size: 1.8rem;
  font-weight: var(--fw-bold);
  color: var(--color-primary-bright);
  line-height: 1;
  min-width: 36px;
}

.ask-item.blue .ask-number { color: var(--color-secondary); }

.ask-body .h3 { margin-bottom: 6px; }
.ask-body .small-text { margin-top: 4px; }


/* ============================================================
   SLIDE TYPE: TIMELINE
   ============================================================ */

.slide-timeline { background: var(--color-bg-dark); }

.timeline {
  display: flex;
  align-items: flex-start;
  gap: 0;
  margin-top: var(--sp-xl);
  position: relative;
}

.timeline::before {
  content: '';
  position: absolute;
  top: 20px;
  left: 40px;
  right: 40px;
  height: 2px;
  background: rgba(250,243,232,0.12);
}

.timeline-node {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  position: relative;
  padding: 0 12px;
}

.timeline-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--color-primary-bright);
  margin-bottom: var(--sp-sm);
  position: relative;
  z-index: 2;
}

.timeline-dot.blue { background: var(--color-secondary); }
.timeline-dot.teal { background: var(--color-tertiary); }

.timeline-title {
  font-size: var(--fs-small);
  font-weight: var(--fw-bold);
  color: var(--color-white);
  margin-bottom: 6px;
}

.timeline-desc {
  font-size: var(--fs-caption);
  color: var(--color-text-secondary);
  line-height: 1.5;
}


/* ============================================================
   SLIDE TYPE: COMPARISON
   ============================================================ */

.slide-comparison { background: var(--color-bg-dark); }

.comparison-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--sp-xl);
  margin-top: var(--sp-lg);
}

.comparison-col .h3 { margin-bottom: var(--sp-sm); padding-bottom: var(--sp-sm); }
.comparison-col:first-child .h3 { border-bottom: 2px solid var(--color-primary-bright); }
.comparison-col:last-child .h3 { border-bottom: 2px solid var(--color-secondary); }


/* ============================================================
   SLIDE TYPE: DIAGRAM (SVG area)
   ============================================================ */

.slide-diagram { background: var(--color-bg-dark); }

.diagram-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: var(--sp-md);
}

.diagram-area svg { max-width: 100%; max-height: 100%; }


/* ============================================================
   SLIDE TYPE: END
   ============================================================ */

.slide-end {
  justify-content: center;
  align-items: center;
  text-align: center;
  background: var(--color-bg-black);
}

.slide-end .brand-mark { font-size: 2.2rem; margin-bottom: var(--sp-md); }
.slide-end .tagline { font-style: italic; color: var(--color-text-secondary); font-size: var(--fs-body); margin-bottom: var(--sp-xl); }
.slide-end .copyright { font-size: 0.65rem; color: var(--color-text-dim); max-width: 500px; line-height: 1.6; }


/* ============================================================
   LAYOUT MODIFIERS
   ============================================================ */

.layout-two-col .slide-body { display: grid; grid-template-columns: 1.3fr 1fr; gap: 36px; align-items: start; }
.layout-two-col-equal .slide-body { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-xl); align-items: start; }
.layout-three-col .slide-body { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: var(--sp-lg); align-items: start; }
.layout-sidebar .slide-body { display: grid; grid-template-columns: 2fr 1fr; gap: var(--sp-xl); align-items: start; }


/* ============================================================
   INNER COMPONENTS
   ============================================================ */

/* --- Green Bar Accent ------------------------------------- */
.green-bar { width: 56px; height: 4px; background: var(--color-primary-bright); margin: 20px 0; }
.green-bar.small { width: 28px; height: 3px; }
.green-bar.blue { background: var(--color-secondary); }

/* --- Brand Line ------------------------------------------- */
.brand-line { width: 80px; height: 3px; background: var(--color-primary); margin: 20px 0; }

/* --- Card ------------------------------------------------- */
.card {
  background: rgba(250,243,232,0.05);
  border: 1px solid rgba(184,134,11,0.18);
  border-radius: 4px;
  padding: var(--sp-md);
}

.card-accent-rule { width: 28px; height: 3px; background: var(--color-primary-bright); margin-bottom: 14px; }
.card-accent-rule.blue { background: var(--color-secondary); }
.card-accent-rule.teal { background: var(--color-tertiary); }

/* --- Card Grid -------------------------------------------- */
.card-grid { display: grid; gap: var(--sp-sm); margin-top: var(--sp-lg); }
.card-grid-2 { grid-template-columns: 1fr 1fr; }
.card-grid-3 { grid-template-columns: 1fr 1fr 1fr; }

/* --- Col Card (with top accent) --------------------------- */
.col-card {
  padding: 28px 32px;
  background: rgba(250,243,232,0.03);
  border: 1px solid rgba(250,243,232,0.06);
  border-radius: 4px;
  border-top: 3px solid var(--color-primary);
}

.col-card.teal { border-top-color: var(--color-secondary); }
.col-card.blue { border-top-color: var(--color-secondary); }

/* --- Callout Box ------------------------------------------ */
.callout-box {
  padding: 24px 32px;
  border-left: 4px solid var(--color-primary-bright);
  background: rgba(184,134,11,0.08);
  border-radius: 0 8px 8px 0;
  margin-top: var(--sp-lg);
}

.callout-box.blue { border-left-color: var(--color-secondary); background: rgba(194,96,63,0.08); }
.callout-box strong { color: var(--color-white); }

/* --- Highlight Box ---------------------------------------- */
.highlight-box {
  border-left: 4px solid var(--color-primary-bright);
  padding: 20px 28px;
  background: rgba(184,134,11,0.08);
  margin-top: 28px;
  border-radius: 0 4px 4px 0;
}

.highlight-box.blue { border-left-color: var(--color-secondary); background: rgba(194,96,63,0.08); }
.highlight-box strong { color: var(--color-primary-bright); }
.highlight-box.blue strong { color: var(--color-secondary); }

/* --- Point List ------------------------------------------- */
.point-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: var(--sp-sm);
}

.point-list li {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  font-size: var(--fs-body);
  color: var(--color-text-body);
  line-height: 1.6;
  font-weight: var(--fw-light);
  padding: 10px 0;
  border-bottom: 1px solid rgba(250,243,232,0.06);
}

.point-list li::before {
  content: '';
  width: 8px; height: 8px; min-width: 8px;
  border-radius: 50%;
  background: var(--color-primary-bright);
  margin-top: 8px;
}

.point-list.blue li::before { background: var(--color-secondary); }

/* --- Insight List ----------------------------------------- */
.insight-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-top: var(--sp-sm);
}

.insight-list li {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  font-size: var(--fs-small);
  color: rgba(250,243,232,0.8);
  line-height: 1.6;
}

.insight-list li::before {
  content: '';
  width: 6px; height: 6px; min-width: 6px;
  border-radius: 50%;
  background: var(--color-primary-bright);
  margin-top: 9px;
}

.insight-list.blue li::before { background: var(--color-secondary); }

/* --- Brand Mark ------------------------------------ */
.brand-mark {
  font-size: 1rem;
  font-weight: var(--fw-bold);
  color: var(--color-white);
  letter-spacing: 0.05em;
}

.brand-mark .dot {
  display: inline-block;
  width: 8px; height: 8px;
  background: var(--color-primary);
  border-radius: 50%;
  margin-left: 2px;
  vertical-align: middle;
}

/* --- Logo Dot --------------------------------------------- */
.logo-dot {
  display: inline-block;
  width: 8px; height: 8px;
  background: var(--color-primary);
  border-radius: 50%;
}

/* --- Circle Motifs (decorative) --------------------------- */
.circle-motif {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  border: 1px solid rgba(184,134,11,0.06);
}

/* --- Slide Footer Bar ------------------------------------- */
.slide-footer {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: var(--gradient-primary);
}

.slide-footer.blue { background: linear-gradient(135deg, var(--color-secondary), #D4A017); }
.slide-footer.gradient { background: var(--gradient-full); }

/* --- Struck text (deprecated items) ----------------------- */
.struck { text-decoration: line-through; text-decoration-color: rgba(255,100,100,0.6); color: rgba(250,243,232,0.35); }


/* ============================================================ */

/* ============================================================
   ENGINE CSS - Do not modify
   ============================================================ */

/* --- Reset & Base --- */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; -webkit-font-smoothing: antialiased; }
body { font-family: var(--font-primary); background: var(--color-bg-black); color: var(--color-white); overflow: hidden; }

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; -webkit-font-smoothing: antialiased; }
body { font-family: 'Open Sans', Arial, Helvetica, sans-serif; background: #000; color: var(--color-white); overflow: hidden; }
   DECK ENGINE
   ============================================================ */

.deck {
  width: 100vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
  background: var(--color-bg-dark, #282728);
}

.deck-scaler {
  width: 1280px;
  height: 720px;
  position: absolute;
  top: 0; left: 0;
  transform-origin: 0 0;
}

.slide {
  position: absolute;
  top: 0; left: 0;
  width: 1280px;
  height: 720px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: var(--slide-pad-top) var(--slide-pad-x) var(--slide-pad-bottom);
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--tr-slow);
  z-index: var(--z-slide);
  overflow: hidden;
}

.slide.active {
  opacity: 1;
  pointer-events: auto;
}

/* Green top bar on every slide */
.slide::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: var(--color-primary);
  z-index: 2;
}


/* ============================================================
   NAVIGATION CHROME
   ============================================================ */

/* --- Confidential Bar ------------------------------------- */
#conf-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 24px;
  background: var(--color-bg-black);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.6rem;
  font-weight: var(--fw-semi);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--color-text-dim);
  z-index: var(--z-chrome);
}

/* --- Progress Bar ----------------------------------------- */
#progress {
  position: fixed;
  top: 24px; left: 0;
  height: 3px;
  background: var(--color-primary-bright);
  width: 0%;
  transition: width var(--tr-normal);
  z-index: var(--z-chrome);
}

/* --- Dot Navigation --------------------------------------- */
#dots {
  position: fixed;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 10px;
  z-index: var(--z-chrome);
}

.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.25);
  cursor: pointer;
  transition: all var(--tr-fast);
}

.dot:hover { background: rgba(255,255,255,0.5); }
.dot.active { background: var(--color-primary-bright); transform: scale(1.3); }

.dot.has-comment::after {
  content: '';
  position: absolute;
  top: -2px; right: -2px;
  width: 5px; height: 5px;
  background: var(--color-secondary);
  border-radius: 50%;
}

.dot { position: relative; }

/* --- Slide Counter ---------------------------------------- */
#counter {
  position: fixed;
  bottom: 16px; right: 20px;
  font-size: 0.7rem;
  color: var(--color-text-dim);
  z-index: var(--z-chrome);
  font-variant-numeric: tabular-nums;
}

/* --- Nav Buttons ------------------------------------------ */
.nav-btn {
  position: fixed;
  bottom: 16px;
  width: 36px; height: 36px;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 50%;
  background: transparent;
  color: var(--color-text-secondary);
  font-size: 0.9rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--tr-fast);
  z-index: var(--z-chrome);
}

.nav-btn:hover { border-color: var(--color-primary-bright); color: var(--color-primary-bright); }
#prev-btn { right: 110px; }
#next-btn { right: 68px; }

/* --- Logo Mark -------------------------------------------- */
#logo-mark {
  position: absolute;
  top: 18px; left: 24px;
  font-size: 0.85rem;
  font-weight: var(--fw-bold);
  color: var(--color-white);
  letter-spacing: 0.05em;
  z-index: 10;
}

#logo-mark .logo-dot {
  display: inline-block;
  width: 6px; height: 6px;
  background: var(--color-primary);
  border-radius: 50%;
  margin-left: 1px;
  vertical-align: middle;
}

/* --- Navigation Hint -------------------------------------- */
#hint {
  position: fixed;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.75rem;
  color: var(--color-text-dim);
  transition: opacity 1s ease;
  z-index: var(--z-chrome);
}


/* ============================================================
   TOOLBAR
   ============================================================ */

#toolbar {
  position: fixed;
  top: 34px; right: 60px;
  display: flex;
  align-items: center;
  gap: 8px;
  z-index: var(--z-toolbar);
}

.toolbar-btn {
  padding: 5px 12px;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 4px;
  background: rgba(0,0,0,0.6);
  color: var(--color-text-secondary);
  font-size: 0.65rem;
  font-weight: var(--fw-semi);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all var(--tr-fast);
  font-family: var(--font-primary);
}

.toolbar-btn:hover { border-color: var(--color-primary-bright); color: var(--color-primary-bright); }
.toolbar-btn.active { background: var(--color-primary-bright); color: var(--color-bg-black); border-color: var(--color-primary-bright); }

#mode-indicator {
  padding: 5px 12px;
  border-radius: 4px;
  font-size: 0.65rem;
  font-weight: var(--fw-bold);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  display: none;
}

#mode-indicator.editing {
  display: block;
  background: var(--color-primary-bright);
  color: var(--color-bg-black);
  animation: pulse-glow 2s ease-in-out infinite;
}

@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 4px rgba(134,235,34,0.3); }
  50% { box-shadow: 0 0 12px rgba(134,235,34,0.6); }
}


/* ============================================================
   EDIT MODE
   ============================================================ */

.edit-mode [data-content] {
  outline: 2px dashed rgba(134,235,34,0.4);
  outline-offset: 4px;
  cursor: text;
  border-radius: 4px;
  transition: outline-color var(--tr-fast);
  min-height: 1em;
}

.edit-mode [data-content]:hover { outline-color: rgba(134,235,34,0.7); }
.edit-mode [data-content]:focus { outline-color: var(--color-primary-bright); outline-style: solid; background: rgba(134,235,34,0.05); }


/* ============================================================
   FORM PANEL (left side)
   ============================================================ */

#form-panel {
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: 380px;
  background: var(--color-panel-bg);
  border-right: 1px solid rgba(255,255,255,0.1);
  transform: translateX(-100%);
  transition: transform var(--tr-normal);
  z-index: var(--z-panel);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#form-panel.open { transform: translateX(0); }

.panel-header {
  padding: 16px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.panel-title {
  font-size: 0.75rem;
  font-weight: var(--fw-bold);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--color-primary-bright);
}

.panel-close {
  background: none; border: none;
  color: var(--color-text-secondary);
  cursor: pointer;
  font-size: 1.2rem;
  padding: 4px;
}

.panel-close:hover { color: var(--color-white); }

.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
}

.form-group {
  margin-bottom: 16px;
}

.form-label {
  display: block;
  font-size: 0.65rem;
  font-weight: var(--fw-semi);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--color-text-secondary);
  margin-bottom: 6px;
}

.form-textarea {
  width: 100%;
  min-height: 60px;
  padding: 10px 12px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 4px;
  color: var(--color-white);
  font-family: var(--font-primary);
  font-size: 0.8rem;
  line-height: 1.5;
  resize: vertical;
}

.form-textarea:focus { outline: none; border-color: var(--color-primary-bright); }

.panel-page-id {
  font-size: 0.6rem;
  color: var(--color-text-dim);
  font-family: monospace;
  margin-bottom: 12px;
  padding: 4px 8px;
  background: rgba(255,255,255,0.04);
  border-radius: 2px;
  display: inline-block;
}


/* ============================================================
   COMMENT PANEL (right side)
   ============================================================ */

#comment-panel {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: 360px;
  background: var(--color-panel-bg);
  border-left: 1px solid rgba(255,255,255,0.1);
  transform: translateX(100%);
  transition: transform var(--tr-normal);
  z-index: var(--z-panel);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#comment-panel.open { transform: translateX(0); }

.comment-list {
  flex: 1;
  overflow-y: auto;
  padding: 12px 20px;
}

.comment-item {
  padding: 12px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.comment-time {
  font-size: 0.6rem;
  color: var(--color-text-dim);
  margin-bottom: 4px;
}

.comment-text {
  font-size: 0.8rem;
  color: var(--color-text-body);
  line-height: 1.5;
}

.comment-delete {
  background: none; border: none;
  color: var(--color-text-dim);
  cursor: pointer;
  font-size: 0.65rem;
  float: right;
  padding: 2px 6px;
}

.comment-delete:hover { color: rgba(255,100,100,0.8); }

.comment-empty {
  text-align: center;
  color: var(--color-text-dim);
  font-size: 0.8rem;
  padding: var(--sp-xl) 0;
}

.comment-input-area {
  flex-shrink: 0;
  padding: 12px 20px;
  border-top: 1px solid rgba(255,255,255,0.08);
  display: flex;
  gap: 8px;
}

.comment-input-area textarea {
  flex: 1;
  min-height: 40px;
  padding: 8px 12px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 4px;
  color: var(--color-white);
  font-family: var(--font-primary);
  font-size: 0.8rem;
  resize: none;
}

.comment-input-area textarea:focus { outline: none; border-color: var(--color-secondary); }

.comment-add-btn {
  padding: 8px 14px;
  background: var(--color-secondary);
  border: none;
  border-radius: 4px;
  color: var(--color-white);
  font-size: 0.7rem;
  font-weight: var(--fw-semi);
  cursor: pointer;
  white-space: nowrap;
  font-family: var(--font-primary);
}

.comment-add-btn:hover { background: #0090c4; }


/* ============================================================
   TOAST NOTIFICATION
   ============================================================ */

#toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  padding: 10px 24px;
  background: var(--color-bg-dark);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 6px;
  font-size: 0.8rem;
  color: var(--color-white);
  z-index: var(--z-toast);
  transition: transform var(--tr-normal);
  pointer-events: none;
}

#toast.visible { transform: translateX(-50%) translateY(0); }


/* ============================================================
   PRINT STYLES
   ============================================================ */

@media print {
  body { overflow: visible; background: white; }
  .deck { position: static; width: auto; height: auto; overflow: visible; display: block; }
  .deck-scaler { transform: none !important; width: auto; height: auto; }

  .slide {
    position: relative !important;
    opacity: 1 !important;
    pointer-events: auto !important;
    page-break-after: always;
    break-after: page;
    width: 13.333in;
    height: 7.5in;
    overflow: hidden;
  }

  #conf-bar, #progress, #dots, #counter, #hint,
  #logo-mark, #toolbar, .nav-btn,
  #form-panel, #comment-panel, #toast { display: none !important; }

  .slide::before { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
  .circle-motif { print-color-adjust: exact; -webkit-print-color-adjust: exact; }

  @page { size: 13.333in 7.5in; margin: 0; }
}


</style>
</head>

<!-- ============================================================

<script>
(function() {
  'use strict';

  /* ==========================================================
     CONTENT STORE
     Reads from embedded <script id="presentation-content">.
     Saves to localStorage. On file-save, updates the embedded
     script block so the HTML file itself contains current data.
     ========================================================== */
  class ContentStore {
    constructor() {
      const raw = document.getElementById('presentation-content').textContent;
      this.original = JSON.parse(raw);
      this.slug = this.original.meta?.slug || 'presentation';
      this.storageKey = `dl-pres-content-${this.slug}`;
      this.dirty = false;

      // Load from localStorage if edits exist, else use embedded
      const saved = localStorage.getItem(this.storageKey);
      if (saved) {
        try { this.data = JSON.parse(saved); } catch(e) { this.data = structuredClone(this.original); }
      } else {
        this.data = structuredClone(this.original);
      }
    }

    get(pageId, field) {
      return this.data.pages?.[pageId]?.[field] ?? '';
    }

    set(pageId, field, value) {
      if (!this.data.pages[pageId]) this.data.pages[pageId] = {};
      this.data.pages[pageId][field] = value;
      this.dirty = true;
    }

    getPageFields(pageId) {
      return this.data.pages?.[pageId] ? Object.entries(this.data.pages[pageId]) : [];
    }

    save() {
      localStorage.setItem(this.storageKey, JSON.stringify(this.data));
      this.dirty = true;
    }

    /** Bake current data into the embedded script element (for file save). */
    bakeIntoDOM() {
      const el = document.getElementById('presentation-content');
      if (el) el.textContent = JSON.stringify(this.data, null, 2);
    }

    reset() {
      this.data = structuredClone(this.original);
      localStorage.removeItem(this.storageKey);
      this.dirty = true;
    }

    exportJSON() {
      const blob = new Blob([JSON.stringify(this.data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${this.slug}-content.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    importJSON(json) {
      this.data = json;
      this.save();
    }

    getMeta() { return this.data.meta || {}; }
  }


  /* ==========================================================
     CONTENT BINDER
     Binds data-content attributes to DOM elements.
     ========================================================== */
  class ContentBinder {
    constructor(store) {
      this.store = store;
    }

    renderAll() {
      document.querySelectorAll('[data-content]').forEach(el => {
        const [pageId, field] = el.dataset.content.split('.');
        if (pageId && field) {
          const val = this.store.get(pageId, field);
          if (val) el.innerHTML = val;
        }
      });

      const meta = this.store.getMeta();
      const confBar = document.getElementById('conf-bar');
      if (meta.confidential) confBar.textContent = meta.confidential;
      if (meta.date) confBar.textContent += ` \u2014 ${meta.date}`;
      const logoEl = document.getElementById('logo-mark');
      if (meta.logo && logoEl) logoEl.innerHTML = meta.logo;
    }

    renderPage(pageId) {
      document.querySelectorAll(`[data-page-id="${pageId}"] [data-content]`).forEach(el => {
        const parts = el.dataset.content.split('.');
        if (parts.length === 2) {
          const val = this.store.get(parts[0], parts[1]);
          if (val !== undefined) el.innerHTML = val;
        }
      });
    }

    readFromDOM() {
      const allowedTags = ['EM', 'STRONG', 'BR', 'SPAN'];
      document.querySelectorAll('[data-content]').forEach(el => {
        const [pageId, field] = el.dataset.content.split('.');
        if (pageId && field) {
          const temp = document.createElement('div');
          temp.innerHTML = el.innerHTML;
          this._sanitize(temp, allowedTags);
          this.store.set(pageId, field, temp.innerHTML);
        }
      });
    }

    _sanitize(node, allowed) {
      const children = Array.from(node.childNodes);
      children.forEach(child => {
        if (child.nodeType === 1) {
          if (!allowed.includes(child.tagName)) {
            const text = document.createTextNode(child.textContent);
            node.replaceChild(text, child);
          } else {
            const attrs = Array.from(child.attributes);
            attrs.forEach(attr => {
              if (!(child.tagName === 'SPAN' && attr.name === 'class') &&
                  !(child.tagName === 'SPAN' && attr.name === 'style')) {
                child.removeAttribute(attr.name);
              }
            });
            this._sanitize(child, allowed);
          }
        }
      });
    }
  }


  /* ==========================================================
     NAVIGATION ENGINE
     ========================================================== */
  class NavigationEngine {
    constructor() {
      this.slides = Array.from(document.querySelectorAll('.slide'));
      this.total = this.slides.length;
      this.current = 0;
      this.locked = false;

      this._buildDots();
      this._bindKeys();
      this._bindButtons();
      this._update();
    }

    goTo(n) {
      if (this.locked || n < 0 || n >= this.total || n === this.current) return;
      this.slides[this.current].classList.remove('active');
      this.current = n;
      this.slides[this.current].classList.add('active');
      this._update();
      this._dismissHint();
      document.dispatchEvent(new CustomEvent('slide-change', { detail: { index: n, pageId: this.currentPageId() } }));
    }

    currentPageId() {
      return this.slides[this.current]?.dataset.pageId || '';
    }

    lock()   { this.locked = true; }
    unlock() { this.locked = false; }

    _update() {
      document.getElementById('counter').textContent = `${this.current + 1} / ${this.total}`;
      document.getElementById('progress').style.width = `${((this.current + 1) / this.total) * 100}%`;
      this.dots.forEach((d, i) => d.classList.toggle('active', i === this.current));
    }

    _buildDots() {
      const container = document.getElementById('dots');
      container.innerHTML = '';
      this.dots = this.slides.map((_, i) => {
        const dot = document.createElement('div');
        dot.className = 'dot' + (i === 0 ? ' active' : '');
        dot.addEventListener('click', () => this.goTo(i));
        container.appendChild(dot);
        return dot;
      });
    }

    _bindKeys() {
      document.addEventListener('keydown', (e) => {
        if (this.locked) return;
        if (e.key >= '1' && e.key <= '9') {
          const n = parseInt(e.key) - 1;
          if (n < this.total) { e.preventDefault(); this.goTo(n); }
          return;
        }
        switch(e.key) {
          case 'ArrowRight': case 'ArrowDown': case ' ': case 'PageDown':
            e.preventDefault(); this.goTo(this.current + 1); break;
          case 'ArrowLeft': case 'ArrowUp': case 'PageUp':
            e.preventDefault(); this.goTo(this.current - 1); break;
          case 'Home':
            e.preventDefault(); this.goTo(0); break;
          case 'End':
            e.preventDefault(); this.goTo(this.total - 1); break;
        }
      });
    }

    _bindButtons() {
      document.getElementById('prev-btn').addEventListener('click', () => this.goTo(this.current - 1));
      document.getElementById('next-btn').addEventListener('click', () => this.goTo(this.current + 1));
    }

    _dismissHint() {
      const hint = document.getElementById('hint');
      if (hint.style.opacity !== '0') {
        hint.style.opacity = '0';
        setTimeout(() => hint.style.display = 'none', 1000);
      }
    }
  }


  /* ==========================================================
     EDIT CONTROLLER
     ========================================================== */
  class EditController {
    constructor(store, binder, nav) {
      this.store = store;
      this.binder = binder;
      this.nav = nav;
      this.active = false;
    }

    toggle() { this.active ? this.deactivate() : this.activate(); }

    activate() {
      this.active = true;
      this.nav.lock();
      document.body.classList.add('edit-mode');
      document.querySelectorAll('[data-content]').forEach(el => el.contentEditable = 'true');
      document.getElementById('mode-indicator').className = 'editing';
      document.getElementById('mode-indicator').textContent = 'EDITING';
      document.getElementById('btn-edit').classList.add('active');
    }

    deactivate() {
      this.active = false;
      this.nav.unlock();
      document.body.classList.remove('edit-mode');
      document.querySelectorAll('[data-content]').forEach(el => { el.contentEditable = 'false'; el.blur(); });
      document.getElementById('mode-indicator').className = '';
      document.getElementById('btn-edit').classList.remove('active');
    }

    save() {
      this.binder.readFromDOM();
      this.store.save();
      this.deactivate();
      return true;
    }

    discard() {
      this.deactivate();
      this.binder.renderAll();
    }
  }


  /* ==========================================================
     COMMENT SYSTEM
     Reads from embedded <script id="presentation-comments">.
     Saves to localStorage. On file-save, bakes comments back
     into the embedded script so the HTML file has them.
     ========================================================== */
  class CommentSystem {
    constructor(store) {
      this.slug = store.slug;
      this.storageKey = `dl-pres-comments-${this.slug}`;
      this.open = false;
      this.currentPageId = '';

      // Load: localStorage first (has latest), fall back to embedded
      const saved = localStorage.getItem(this.storageKey);
      if (saved) {
        try { this.comments = JSON.parse(saved); } catch(e) { this.comments = {}; }
      } else {
        // Read from embedded script block
        try {
          const raw = document.getElementById('presentation-comments').textContent;
          this.comments = JSON.parse(raw) || {};
        } catch(e) { this.comments = {}; }
      }

      this._bindUI();
    }

    toggle() { this.open ? this.close() : this.openPanel(); }

    openPanel() {
      this.open = true;
      document.getElementById('comment-panel').classList.add('open');
      document.getElementById('btn-comment').classList.add('active');
      this.renderForPage(this.currentPageId);
    }

    close() {
      this.open = false;
      document.getElementById('comment-panel').classList.remove('open');
      document.getElementById('btn-comment').classList.remove('active');
    }

    setPage(pageId) {
      this.currentPageId = pageId;
      if (this.open) this.renderForPage(pageId);
    }

    addComment(text) {
      if (!text.trim()) return;
      if (!this.comments[this.currentPageId]) this.comments[this.currentPageId] = [];
      this.comments[this.currentPageId].push({
        id: Date.now().toString(36),
        text: text.trim(),
        time: new Date().toLocaleString()
      });
      this._save();
      this.renderForPage(this.currentPageId);
    }

    deleteComment(pageId, commentId) {
      if (!this.comments[pageId]) return;
      this.comments[pageId] = this.comments[pageId].filter(c => c.id !== commentId);
      if (this.comments[pageId].length === 0) delete this.comments[pageId];
      this._save();
      this.renderForPage(this.currentPageId);
    }

    renderForPage(pageId) {
      const title = document.getElementById('comment-panel-title');
      title.textContent = `Notes \u2014 ${pageId}`;

      const list = document.getElementById('comment-list');
      const items = this.comments[pageId] || [];

      if (items.length === 0) {
        list.innerHTML = '<div class="comment-empty">No notes for this slide</div>';
      } else {
        list.innerHTML = items.map(c => `
          <div class="comment-item">
            <button class="comment-delete" data-id="${c.id}">&times;</button>
            <div class="comment-time">${c.time}</div>
            <div class="comment-text">${this._escapeHTML(c.text)}</div>
          </div>
        `).join('');

        list.querySelectorAll('.comment-delete').forEach(btn => {
          btn.addEventListener('click', () => this.deleteComment(pageId, btn.dataset.id));
        });
      }
    }

    getCount(pageId) {
      return (this.comments[pageId] || []).length;
    }

    /** Bake current comments into the embedded script element (for file save). */
    bakeIntoDOM() {
      const el = document.getElementById('presentation-comments');
      if (el) el.textContent = JSON.stringify(this.comments, null, 2);
    }

    _save() {
      localStorage.setItem(this.storageKey, JSON.stringify(this.comments));
    }

    _bindUI() {
      document.getElementById('comment-close').addEventListener('click', () => this.close());
      document.getElementById('comment-add').addEventListener('click', () => {
        const input = document.getElementById('comment-input');
        this.addComment(input.value);
        input.value = '';
      });
      document.getElementById('comment-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          document.getElementById('comment-add').click();
        }
        e.stopPropagation();
      });
    }

    _escapeHTML(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  }


  /* ==========================================================
     FORM PANEL
     ========================================================== */
  class FormPanel {
    constructor(store, binder) {
      this.store = store;
      this.binder = binder;
      this.open = false;
      this.currentPageId = '';

      document.getElementById('form-close').addEventListener('click', () => this.close());
    }

    toggle() { this.open ? this.close() : this.openPanel(); }

    openPanel() {
      this.open = true;
      document.getElementById('form-panel').classList.add('open');
      document.getElementById('btn-form').classList.add('active');
      this.renderForPage(this.currentPageId);
    }

    close() {
      if (this.open) this._readFormValues();
      this.open = false;
      document.getElementById('form-panel').classList.remove('open');
      document.getElementById('btn-form').classList.remove('active');
    }

    setPage(pageId) {
      if (this.open && this.currentPageId) this._readFormValues();
      this.currentPageId = pageId;
      if (this.open) this.renderForPage(pageId);
    }

    renderForPage(pageId) {
      const body = document.getElementById('form-body');
      const fields = this.store.getPageFields(pageId);

      let html = `<div class="panel-page-id">data-page-id: ${pageId}</div>`;

      if (fields.length === 0) {
        html += '<div class="comment-empty">No content fields on this slide</div>';
      } else {
        fields.forEach(([key, value]) => {
          const plainText = value.replace(/<[^>]*>/g, match => {
            if (match.includes('class="accent"')) return '[accent]';
            if (match === '</span>') return '[/accent]';
            if (match === '<em>') return '[em]';
            if (match === '</em>') return '[/em]';
            if (match === '<strong>') return '[strong]';
            if (match === '</strong>') return '[/strong]';
            if (match === '<br>') return '\n';
            return '';
          });

          html += `
            <div class="form-group">
              <label class="form-label">${key}</label>
              <textarea class="form-textarea" data-form-field="${pageId}.${key}"
                rows="${plainText.length > 80 ? 4 : 2}">${plainText}</textarea>
            </div>
          `;
        });
      }

      body.innerHTML = html;

      body.querySelectorAll('.form-textarea').forEach(ta => {
        ta.addEventListener('input', () => this._syncField(ta));
        ta.addEventListener('keydown', e => e.stopPropagation());
      });
    }

    _syncField(textarea) {
      const [pageId, field] = textarea.dataset.formField.split('.');
      let val = textarea.value
        .replace(/\[accent\](.*?)\[\/accent\]/g, '<span class="accent">$1</span>')
        .replace(/\[em\](.*?)\[\/em\]/g, '<em>$1</em>')
        .replace(/\[strong\](.*?)\[\/strong\]/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');

      this.store.set(pageId, field, val);
      this.store.save();

      const el = document.querySelector(`[data-content="${pageId}.${field}"]`);
      if (el) el.innerHTML = val;
    }

    _readFormValues() {
      document.querySelectorAll('#form-body .form-textarea').forEach(ta => {
        this._syncField(ta);
      });
    }
  }


  /* ==========================================================
     FILE SAVER
     Uses showSaveFilePicker to write HTML back to disk.
     First save shows a dialog; subsequent saves in the same
     session go to the same file with no prompt.
     Falls back to download if API unavailable.
     ========================================================== */
  class FileSaver {
    constructor(store, comments) {
      this.store = store;
      this.comments = comments;
      this.fileHandle = null;
      this.filename = decodeURIComponent(location.pathname.split('/').pop()) || `${store.slug}.html`;
    }

    async save() {
      this.store.bakeIntoDOM();
      this.comments.bakeIntoDOM();

      const slides = document.querySelectorAll('.slide');
      const dots = document.querySelectorAll('.dot');
      const currentActive = document.querySelector('.slide.active');
      const currentDot = document.querySelector('.dot.active');
      slides.forEach(s => s.classList.remove('active'));
      dots.forEach((d, i) => d.classList.toggle('active', i === 0));
      if (slides[0]) slides[0].classList.add('active');

      const html = `<!DOCTYPE html>\n${document.documentElement.outerHTML}`;

      // Restore user's current view
      slides.forEach(s => s.classList.remove('active'));
      dots.forEach(d => d.classList.remove('active'));
      if (currentActive) currentActive.classList.add('active');
      if (currentDot) currentDot.classList.add('active');

      if ('showSaveFilePicker' in window) {
        try {
          if (!this.fileHandle) {
            this.fileHandle = await window.showSaveFilePicker({
              suggestedName: this.filename,
              types: [{ description: 'HTML', accept: { 'text/html': ['.html'] } }]
            });
          }
          const writable = await this.fileHandle.createWritable();
          await writable.write(html);
          await writable.close();
          this.store.dirty = false;
          return true;
        } catch(e) {
          if (e.name === 'AbortError') return false;
        }
      }

      const blob = new Blob([html], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = this.filename;
      a.click();
      URL.revokeObjectURL(url);
      this.store.dirty = false;
      return true;
    }
  }


  /* ==========================================================
     TOAST
     ========================================================== */
  function toast(msg, duration = 2500) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('visible');
    setTimeout(() => el.classList.remove('visible'), duration);
  }


  /* ==========================================================
     APP — Orchestrator
     ========================================================== */
  // Scale the 1280x720 slide box to fit the viewport
  function scaleDeck() {
    const scaler = document.getElementById('deck-scaler');
    if (!scaler) return;
    const vw = window.innerWidth || document.documentElement.clientWidth || 1280;
    const vh = window.innerHeight || document.documentElement.clientHeight || 720;
    const scale = Math.min(vw / 1280, vh / 720);
    const offsetX = (vw - 1280 * scale) / 2;
    const offsetY = (vh - 720 * scale) / 2;
    scaler.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
  }
  window.addEventListener('resize', scaleDeck);
  scaleDeck();

  class App {
    constructor() {
      this.store = new ContentStore();
      this.binder = new ContentBinder(this.store);
      this.nav = new NavigationEngine();
      this.editor = new EditController(this.store, this.binder, this.nav);
      this.comments = new CommentSystem(this.store);
      this.formPanel = new FormPanel(this.store, this.binder);
      this.fileSaver = new FileSaver(this.store, this.comments);

      // Initial render
      this.binder.renderAll();
      this.comments.setPage(this.nav.currentPageId());
      this.formPanel.setPage(this.nav.currentPageId());

      // On slide change
      document.addEventListener('slide-change', (e) => {
        this.comments.setPage(e.detail.pageId);
        this.formPanel.setPage(e.detail.pageId);
      });

      this._bindToolbar();
      this._bindGlobalKeys();
    }

    _bindToolbar() {
      document.getElementById('btn-edit').addEventListener('click', () => {
        if (this.editor.active) {
          this.editor.save();
          toast('Content saved');
        } else {
          this.editor.toggle();
        }
      });

      document.getElementById('btn-form').addEventListener('click', () => this.formPanel.toggle());
      document.getElementById('btn-comment').addEventListener('click', () => this.comments.toggle());

      document.getElementById('btn-save').addEventListener('click', () => this._saveToFile());

      document.getElementById('btn-snapshot').addEventListener('click', () => {
        this._exportSnapshot();
      });
    }

    async _saveToFile() {
      const ok = await this.fileSaver.save();
      if (ok) toast('Saved to file');
    }

    _bindGlobalKeys() {
      document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
        if (e.target.contentEditable === 'true' && this.editor.active) return;

        switch(e.key) {
          case 'e': case 'E':
            e.preventDefault();
            if (this.editor.active) {
              this.editor.save();
              toast('Content saved');
            } else {
              this.editor.toggle();
              toast('Edit mode ON \u2014 press E again to save');
            }
            break;
          case 'f': case 'F':
            if (!this.editor.active) {
              e.preventDefault();
              this.formPanel.toggle();
            }
            break;
          case 'c': case 'C':
            if (!this.editor.active) {
              e.preventDefault();
              this.comments.toggle();
            }
            break;
          case 's': case 'S':
            if (!this.editor.active) {
              e.preventDefault();
              this._saveToFile();
            }
            break;
          case 'Escape':
            if (this.editor.active) {
              this.editor.discard();
              toast('Edits discarded');
            }
            if (this.formPanel.open) this.formPanel.close();
            if (this.comments.open) this.comments.close();
            break;
        }
      });
    }

    _exportSnapshot() {
      this.store.bakeIntoDOM();
      this.comments.bakeIntoDOM();

      // Reset to slide 1 before serializing
      const slides = document.querySelectorAll('.slide');
      const dots = document.querySelectorAll('.dot');
      const currentActive = document.querySelector('.slide.active');
      const currentDot = document.querySelector('.dot.active');
      slides.forEach(s => s.classList.remove('active'));
      dots.forEach((d, i) => d.classList.toggle('active', i === 0));
      if (slides[0]) slides[0].classList.add('active');

      const html = document.documentElement.outerHTML;

      // Restore user's current view
      slides.forEach(s => s.classList.remove('active'));
      dots.forEach(d => d.classList.remove('active'));
      if (currentActive) currentActive.classList.add('active');
      if (currentDot) currentDot.classList.add('active');

      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');

      const removeIds = ['form-panel', 'comment-panel', 'toolbar', 'toast'];
      removeIds.forEach(id => {
        const el = doc.getElementById(id);
        if (el) el.remove();
      });

      // Clear comments from the snapshot
      const commentsScript = doc.getElementById('presentation-comments');
      if (commentsScript) commentsScript.textContent = '{}';

      const blob = new Blob([`<!DOCTYPE html>\n${doc.documentElement.outerHTML}`], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${this.store.slug}-snapshot.html`;
      a.click();
      URL.revokeObjectURL(url);
      toast('Snapshot exported');
    }
  }

  // Boot — clear localStorage on load so embedded JSON is always the source of truth
  document.addEventListener('DOMContentLoaded', () => {
    const slug = JSON.parse(document.getElementById('presentation-content').textContent).meta?.slug || 'presentation';
    localStorage.removeItem(`dl-pres-content-${slug}`);
    localStorage.removeItem(`dl-pres-comments-${slug}`);
    new App();
  });

})();
</script>
